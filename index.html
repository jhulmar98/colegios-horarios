<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa de Calor + Geocercas + Colegios</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Heatmap -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<!-- XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Leaflet Draw -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

#map {
    height: 100vh;
}

/* 🔘 BOTÓN GUARDAR */
#btnGuardar {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 1000;
    background: #111827;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

#btnGuardar:hover {
    background: #1f2937;
}
</style>

</head>

<body>

<div id="map"></div>

<button id="btnGuardar">💾 Guardar Excel</button>

<script>

// ===============================
// 🗺️ MAPA
// ===============================
const map = L.map('map').setView([-12.0464, -77.0428], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);


// ===============================
// 🚁 ICONO DESPEGUE
// ===============================
const iconoHelipuerto = L.divIcon({
    html: `
        <div style="
            width:40px;
            height:40px;
            border-radius:50%;
            background:#16a34a;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-weight:bold;
            font-size:20px;
            border:3px solid white;
            box-shadow:0 0 10px rgba(0,0,0,0.4);
        ">H</div>
    `,
    className: "",
    iconSize: [40, 40],
    iconAnchor: [20, 20]
});


// ===============================
// 📌 LEER EXCEL
// ===============================
async function leerExcel(ruta) {
    try {
        const res = await fetch(ruta);
        const buffer = await res.arrayBuffer();

        const workbook = XLSX.read(buffer, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        return XLSX.utils.sheet_to_json(sheet);
    } catch (error) {
        console.error("Error leyendo:", ruta, error);
        return [];
    }
}


// ===============================
// 🔥 HEATMAP
// ===============================
async function cargarHeatmap() {

    const datos = await leerExcel("puntosdecalor.xlsx");

    const puntos = datos
        .filter(p => p.LATITUD && p.LONGITUD)
        .map(p => [
            parseFloat(p.LATITUD),
            parseFloat(p.LONGITUD),
            1
        ]);

    if (puntos.length === 0) return;

    L.heatLayer(puntos, {
        radius: 25,
        blur: 15,
        maxZoom: 17
    }).addTo(map);
}


// ===============================
// 🔵 GEOCERCAS
// ===============================
async function cargarGeocercas() {

    const datos = await leerExcel("geocercas_msi.xlsx");

    const zonas = {};

    datos.forEach(p => {

        const nombre = p.geocerca_id;
        const lat = parseFloat(p.latitud);
        const lng = parseFloat(p.longitud);
        const orden = parseInt(p.punto);
        const color = p.color || "#2563eb";

        if (isNaN(lat) || isNaN(lng)) return;

        if (!zonas[nombre]) {
            zonas[nombre] = { puntos: [], color };
        }

        zonas[nombre].puntos.push({ lat, lng, orden });

    });

    Object.keys(zonas).forEach(nombre => {

        const coords = zonas[nombre].puntos
            .sort((a,b) => a.orden - b.orden)
            .map(p => [p.lat, p.lng]);

        if (coords.length < 3) return;

        L.polygon(coords, {
            color: zonas[nombre].color,
            weight: 3,
            fillOpacity: 0.15
        })
        .addTo(map)
        .bindPopup(`<b>Geocerca:</b><br>${nombre}`);
    });

}


// ===============================
// 🏫 COLEGIOS
// ===============================
async function cargarColegios() {

    const datos = await leerExcel("Colegios-Georeferenciados.xlsx");

    const icono = L.icon({
        iconUrl: "https://cdn-icons-png.flaticon.com/512/3177/3177361.png",
        iconSize: [28, 28],
        iconAnchor: [14, 28]
    });

    datos.forEach(c => {

        const lat = parseFloat(c.LATITUD);
        const lng = parseFloat(c.LONGITUD);

        if (isNaN(lat) || isNaN(lng)) return;

        const nombre = c["NOMBRE COLEGIO"] || "Sin nombre";
        const direccion = c.DIRECCION || "Sin dirección";
        const nivel = c.NIVEL || "No especificado";

        L.marker([lat, lng], { icon: icono })
        .addTo(map)
        .bindPopup(`
            <b>${nombre}</b><br>
            ${direccion}<br>
            ${nivel}
        `);

    });

}


// ===============================
// ✏️ DIBUJO
// ===============================
const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
    edit: { featureGroup: drawnItems },
    draw: {
        polygon: false,
        rectangle: false,
        marker: { icon: iconoHelipuerto },
        polyline: { shapeOptions: { color: "#dc2626", weight: 4 } },
        circle: { shapeOptions: { color: "#16a34a" } }
    }
});

map.addControl(drawControl);


// ===============================
// 📏 EVENTOS
// ===============================
map.on(L.Draw.Event.CREATED, function (e) {

    const layer = e.layer;
    drawnItems.addLayer(layer);

    if (e.layerType === "polyline") {
        const latlngs = layer.getLatLngs();
        let distancia = 0;

        for (let i = 0; i < latlngs.length - 1; i++) {
            distancia += map.distance(latlngs[i], latlngs[i+1]);
        }

        layer.bindPopup(`Ruta: ${(distancia/1000).toFixed(2)} km`).openPopup();
    }

    if (e.layerType === "circle") {
        layer.bindPopup(`Radio: ${Math.round(layer.getRadius())} m`).openPopup();
    }

    if (e.layerType === "marker") {
        layer.bindPopup(`🚁 Punto de Despegue`).openPopup();
    }

});


// ===============================
// 💾 EXPORTAR EXCEL
// ===============================
document.getElementById("btnGuardar").addEventListener("click", () => {

    const datos = [];

    drawnItems.eachLayer(layer => {

        if (layer instanceof L.Marker) {
            const p = layer.getLatLng();

            datos.push({
                tipo: "DESPEGUE",
                latitud: p.lat,
                longitud: p.lng
            });
        }

        else if (layer instanceof L.Polyline && !(layer instanceof L.Polygon)) {

            layer.getLatLngs().forEach((p, i) => {
                datos.push({
                    tipo: "RUTA",
                    latitud: p.lat,
                    longitud: p.lng,
                    orden: i + 1
                });
            });
        }

        else if (layer instanceof L.Circle) {

            const c = layer.getLatLng();

            datos.push({
                tipo: "CIRCULO",
                latitud: c.lat,
                longitud: c.lng,
                radio: Math.round(layer.getRadius())
            });
        }

    });

    if (datos.length === 0) {
        alert("No hay datos");
        return;
    }

    const ws = XLSX.utils.json_to_sheet(datos);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Drones");

    XLSX.writeFile(wb, "misiones_drones.xlsx");

});


// ===============================
// 🚀 INICIO
// ===============================
(async () => {
    await cargarHeatmap();
    await cargarGeocercas();
    await cargarColegios();
})();

</script>

</body>
</html>
